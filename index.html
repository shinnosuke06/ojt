<!DOCTYPE html><html lang="ja"><head><link rel="apple-touch-icon" href="ojt-icon.png"><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#1e88e5"><meta name="apple-mobile-web-app-title" content="OJT報告AI"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>OJT振り返りサポート</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
textarea{resize:none;overflow:hidden;transition:border-color .2s;}
input[type="text"],input[type="date"],input[type="url"],input[type="password"],textarea,select{font-size:16px!important;}
#pdf-container-wrapper{position:absolute;left:-9999px;top:-9999px;width:170mm;}
.pdf-page{background-color:white;font-family:'Helvetica Neue',Arial,sans-serif;color:#333;font-size:14px;}
.pdf-title{font-size:22px;text-align:center;font-weight:bold;margin-bottom:20px;border-bottom:2px solid #333;padding-bottom:10px;}
.pdf-header-info{display:flex;justify-content:flex-end;gap:20px;margin-bottom:20px;font-size:13px;}
.pdf-section{margin-bottom:20px;}
.pdf-label{font-weight:bold;background-color:#f0fdfa;padding:8px 12px;border-left:4px solid #0d9488;margin-bottom:5px;font-size:13px;page-break-inside:avoid;break-inside:avoid;page-break-after:avoid;break-after:avoid;}
.pdf-value{color:#333;}
.pdf-line{padding:2px 12px;line-height:1.6;min-height:1.6em;word-wrap:break-word;page-break-inside:avoid;break-inside:avoid;}
#toast-container{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:10px;width:90%;max-width:400px;}
.toast{padding:12px 24px;border-radius:8px;color:white;font-weight:bold;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideUp .3s ease-out forwards;opacity:0;text-align:center;word-break:break-word;}
.toast.success{background-color:#10b981;}.toast.error{background-color:#ef4444;}.toast.info{background-color:#3b82f6;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.spinner{border:3px solid rgba(255,255,255,.3);border-radius:50%;border-top:3px solid white;width:20px;height:20px;animation:spin 1s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
#aiModalContent::-webkit-scrollbar{width:8px;}#aiModalContent::-webkit-scrollbar-track{background:#f1f5f9;border-radius:4px;}#aiModalContent::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}#aiModalContent::-webkit-scrollbar-thumb:hover{background:#94a3b8;}
</style></head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col">
<header class="bg-teal-600 text-white p-4 shadow-md z-10 relative"><div class="max-w-3xl mx-auto flex justify-between items-center"><h1 class="text-xl font-bold flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>OJT振り返りサポート</h1></div></header>
<nav class="bg-white shadow-sm z-0"><div class="max-w-3xl mx-auto flex">
<button onclick="switchTab('form')" id="tab-form" class="flex-1 py-3 text-center border-b-2 font-medium text-teal-600 border-teal-600 transition-colors">作成</button>
<button onclick="switchTab('history')" id="tab-history" class="flex-1 py-3 text-center border-b-2 font-medium text-gray-500 border-transparent transition-colors">履歴</button>
<button onclick="switchTab('analysis')" id="tab-analysis" class="flex-1 py-3 text-center border-b-2 font-medium text-gray-500 border-transparent transition-colors">AI分析</button>
<button onclick="switchTab('settings')" id="tab-settings" class="flex-1 py-3 text-center border-b-2 font-medium text-gray-500 border-transparent transition-colors">設定</button>
</div></nav>
<main class="flex-1 overflow-y-auto p-4 md:p-6" id="main-content"></main>
<!-- モーダル群 -->
<div id="aiModalAll" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50"><div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-2xl flex flex-col max-h-[90vh]"><h3 class="text-lg font-bold mb-2 text-teal-800 flex items-center gap-2 border-b pb-3"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>AIによる文章修正</h3><div id="aiModalContent" class="mb-4 flex-1 overflow-y-auto space-y-6 pr-2"></div><div class="flex justify-end gap-3 pt-4 border-t mt-auto"><button onclick="closeAiModalAll()" class="px-5 py-2.5 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300">キャンセル</button><button onclick="applyAiTextSingle()" class="px-5 py-2.5 bg-teal-600 text-white rounded-lg font-bold hover:bg-teal-700 shadow-md">適用する</button></div></div></div>
<div id="templateModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50"><div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md flex flex-col"><h3 class="text-lg font-bold mb-4 text-teal-800 flex items-center gap-2 border-b pb-3">テンプレートとして保存</h3><p class="text-sm text-gray-600 mb-4">現在入力されている内容を使い回し用として保存します。</p><div class="mb-6"><label class="block text-sm font-bold text-gray-700 mb-1">テンプレート名</label><input type="text" id="input_template_name" class="w-full p-3 border-2 border-teal-200 rounded-lg focus:border-teal-500 outline-none"></div><div class="flex justify-end gap-3 pt-4 border-t"><button onclick="closeTemplateModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg">キャンセル</button><button onclick="executeSaveTemplate()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700">保存</button></div></div></div>
<div id="toast-container"></div><div id="pdf-container-wrapper"><div id="pdf-content"></div></div>

<script>
const envApiKey = ""; 
const fields = [
    {id:'item1',label:'1. 本日行った作業内容',placeholder:'（例：〇〇の機械の電源投入から材料セットまで）'},
    {id:'item2',label:'2. できたこと・新しく覚えたこと',placeholder:'（例：手順書なしで材料のセットが1人でできた）'},
    {id:'item3',label:'3. できなかったこと・苦手なこと（課題）',placeholder:'（例：〇〇のエラー解除の手順で少し迷ってしまった）'},
    {id:'item4',label:'4. 安全面での不安箇所・ヒヤリハット',placeholder:'（例：材料セット時に少し危険だったため注意喚起した）'},
    {id:'item5',label:'5. 理解度チェック（反復作業の確認テスト結果）',placeholder:'（例：ボタンを押す意味を質問し正しく答えられた）'},
    {id:'item6',label:'6. 指導者（あなた）からのフォロー・所感',placeholder:'（例：明日もう一度手本を見せてからやらせる予定。）'},
    {id:'item7',label:'7. 明日してほしいこと（指導者）・明日の目標（本人）',placeholder:'（例：〇〇の工程を一人で通してやってみる）'}
];
let state = {currentTab:'form',currentId:null,historyFilter:'all',formData:{date:new Date().toLocaleDateString('sv-SE'),name:'',trainer:'',item1:'',item2:'',item3:'',item4:'',item5:'',item6:'',item7:'',isSummary:false,summaryText:''},history:[],templates:[],settings:{apiKey:'',gasUrl:'',defaultTrainer:''}};
window.onload=()=>{loadData();renderApp();};

function loadData(){
    let s=localStorage.getItem('ojt_settings');if(s)try{state.settings={...state.settings,...JSON.parse(s)};}catch(e){}
    let h=localStorage.getItem('ojt_history');if(h)try{state.history=JSON.parse(h);}catch(e){}
    let t=localStorage.getItem('ojt_templates');if(t)try{state.templates=JSON.parse(t);}catch(e){}
    let d=localStorage.getItem('ojt_draft');if(d){try{let j=JSON.parse(d);state.formData={...state.formData,...j.data};state.currentId=j.id||null;}catch(e){}}
    else if(state.settings.defaultTrainer&&!state.formData.trainer)state.formData.trainer=state.settings.defaultTrainer;
    fetchFromGas();
}
function saveHistory(){localStorage.setItem('ojt_history',JSON.stringify(state.history));}
function saveTemplates(){localStorage.setItem('ojt_templates',JSON.stringify(state.templates));}
function saveDraft(){localStorage.setItem('ojt_draft',JSON.stringify({id:state.currentId,data:state.formData}));}
function saveSettings(){localStorage.setItem('ojt_settings',JSON.stringify(state.settings));}

async function fetchFromGas(){
    if(!state.settings.gasUrl)return;
    try{let r=await fetch(state.settings.gasUrl);let d=await r.json();
    if(d.history&&Array.isArray(d.history)){state.history=d.history;saveHistory();}
    if(d.templates&&Array.isArray(d.templates)){state.templates=d.templates;saveTemplates();}
    if(Array.isArray(d)){state.history=d;saveHistory();}
    if(state.currentTab==='history'||state.currentTab==='form')renderApp();}catch(e){}
}
function sendToGas(action,data,target='history'){
    if(!state.settings.gasUrl)return;
    fetch(state.settings.gasUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,target,data:action==='save'?data:undefined,id:action==='delete'?data:undefined})}).catch(e=>{});
}

function switchTab(t){if(t==='history')state.historyFilter='all';state.currentTab=t;['form','history','analysis','settings'].forEach(id=>{let e=document.getElementById(`tab-${id}`);if(id===t){e.classList.add('text-teal-600','border-teal-600');e.classList.remove('text-gray-500','border-transparent');}else{e.classList.remove('text-teal-600','border-teal-600');e.classList.add('text-gray-500','border-transparent');}});renderApp();}

function renderApp(){
    const m=document.getElementById('main-content');m.innerHTML='';const c=document.createElement('div');c.className='max-w-3xl mx-auto pb-20';
    if(state.currentTab==='form'){c.innerHTML=renderForm();setTimeout(initTextareas,0);}
    else if(state.currentTab==='history')c.innerHTML=renderHistory();
    else if(state.currentTab==='analysis')c.innerHTML=renderAnalysis();
    else c.innerHTML=renderSettings();
    m.appendChild(c);
}

function toggleSummaryMode(isSum){state.formData.isSummary=isSum;saveDraft();renderApp();}
function switchToManualSummary(){state.formData.isSummary=true;state.formData.summaryText='';state.currentId=null;saveDraft();renderApp();showToast("自由にまとめられる白紙のフォームを用意しました");}

function renderForm(){
    let h=`<div class="bg-white rounded-xl shadow-sm p-4 md:p-6 mb-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4"><h2 class="text-xl font-bold text-gray-800">${state.currentId?'報告書の編集':'新規報告書の作成'}</h2>
    <div class="flex items-center gap-3 w-full sm:w-auto"><select onchange="loadTemplate(this.value)" class="flex-1 sm:flex-none p-2 border border-teal-200 rounded text-sm bg-teal-50"><option value="">テンプレート呼出...</option>${state.templates.map(t=>`<option value="${t.id}">${escapeHtml(t.name)}</option>`).join('')}</select><button onclick="clearForm()" class="text-sm text-gray-500 hover:text-gray-700 underline">クリア</button></div></div>
    <div class="flex gap-2 mb-6 border-b border-gray-200"><button onclick="toggleSummaryMode(false)" class="pb-2 px-4 transition-colors ${!state.formData.isSummary?'border-b-2 border-teal-600 text-teal-800 font-bold':'text-gray-500 hover:text-gray-700'}">通常 (7項目)</button><button onclick="toggleSummaryMode(true)" class="pb-2 px-4 transition-colors flex items-center gap-1 ${state.formData.isSummary?'border-b-2 border-teal-600 text-teal-800 font-bold':'text-gray-500'}">要約版</button></div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 bg-teal-50 p-4 rounded-lg">
    <div><label class="block text-sm font-bold text-teal-800 mb-1">日付</label><input type="date" id="input_date" value="${state.formData.date}" onchange="updateFormData('date',this.value)" class="w-full p-2 border rounded"></div>
    <div><label class="block text-sm font-bold text-teal-800 mb-1">氏名</label><input type="text" id="input_name" value="${state.formData.name}" onchange="updateFormData('name',this.value)" class="w-full p-2 border rounded"></div>
    <div><label class="block text-sm font-bold text-teal-800 mb-1">指導者</label><input type="text" id="input_trainer" value="${state.formData.trainer}" onchange="updateFormData('trainer',this.value)" class="w-full p-2 border rounded"></div></div>`;
    
    if(!state.formData.isSummary){
        h+=`<div class="space-y-6">`;
        fields.forEach(f=>{
            h+=`<div class="border rounded-lg p-4 shadow-sm"><label class="block font-bold mb-2">${f.label}</label><textarea id="input_${f.id}" oninput="updateFormData('${f.id}',this.value);autoResize(this);" placeholder="${f.placeholder}" class="w-full p-3 border rounded-lg bg-gray-50 focus:bg-white outline-none focus:ring-2 focus:ring-teal-500" rows="2">${state.formData[f.id]}</textarea><div class="mt-2 flex justify-end"><button onclick="requestAiImprovementSingle('${f.id}')" class="text-sm bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-full hover:bg-indigo-100">AIで丁寧な文章にする</button></div></div>`;
        });
        h+=`</div><div class="mt-8 flex flex-col sm:flex-row justify-center gap-4"><button onclick="requestAiSummaryAll()" class="px-8 py-3.5 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-full font-bold shadow-lg hover:opacity-90">✨ 入力内容をAIで要約する</button><button onclick="switchToManualSummary()" class="px-8 py-3.5 bg-gray-100 text-gray-700 border border-gray-300 rounded-full font-bold shadow-sm hover:bg-gray-200">📝 AIを使わず自分でまとめる(白紙)</button></div>`;
    }else{
        h+=`<div class="border rounded-lg p-4 shadow-sm"><div class="flex items-center gap-2 mb-2"><span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-0.5 rounded font-bold">要約版</span><label class="font-bold">1つにまとめた提出用レポート</label></div><div class="text-sm text-gray-500 mb-3">AIが要約した内容です。直接手直し可能です。</div><textarea id="input_summaryText" oninput="updateFormData('summaryText',this.value);autoResize(this);" placeholder="ここにまとめの文章が入ります..." class="w-full p-4 border-2 border-indigo-100 rounded-lg bg-gray-50 outline-none focus:border-indigo-400 focus:ring-2" rows="12">${state.formData.summaryText}</textarea></div>`;
    }
    
    h+=`<div class="mt-8 flex flex-col gap-4"><button onclick="openTemplateModal()" class="w-full py-3 bg-indigo-50 text-indigo-700 border border-indigo-200 rounded-lg font-bold shadow-sm">入力内容をテンプレートにする</button><div class="flex flex-col sm:flex-row gap-3 justify-center pt-2"><button onclick="saveCurrentForm()" class="flex-1 py-3 bg-teal-600 text-white rounded-lg font-bold shadow-md">履歴に保存</button><button onclick="generatePDF()" id="btn-pdf" class="flex-1 py-3 bg-white border-2 border-teal-600 text-teal-600 rounded-lg font-bold shadow-sm">PDFを作成</button><button onclick="copyToClipboard()" class="flex-1 py-3 bg-white border-2 border-gray-400 text-gray-700 rounded-lg font-bold shadow-sm flex items-center justify-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>テキストをコピー</button></div></div></div>`;
    return h;
}

function setHistoryFilter(f){state.historyFilter=f;renderApp();}
function renderHistory(){
    let h=`<div class="bg-white rounded-xl shadow-sm p-4 md:p-6 mb-6"><div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">保存された報告書</h2><div class="flex gap-2"><button onclick="exportData()" class="text-sm px-3 py-1.5 bg-gray-100 rounded">バックアップ</button><label class="cursor-pointer text-sm px-3 py-1.5 bg-gray-100 rounded">復元<input type="file" accept=".json" onchange="importData(event)" class="hidden"></label></div></div><div class="flex gap-2 mb-6 bg-gray-100 p-1 rounded-lg w-fit"><button onclick="setHistoryFilter('all')" class="px-4 py-1.5 text-sm rounded-md ${state.historyFilter==='all'?'bg-white shadow text-teal-700':'text-gray-500'}">すべて</button><button onclick="setHistoryFilter('summary')" class="px-4 py-1.5 text-sm rounded-md ${state.historyFilter==='summary'?'bg-white shadow text-teal-700':'text-gray-500'}">要約版のみ</button></div>`;
    if(state.history.length===0)h+=`<div class="text-center py-10 text-gray-500">データはありません。</div>`;
    else{
        let fh=[...state.history].sort((a,b)=>new Date(b.data.date)-new Date(a.data.date));
        if(state.historyFilter==='summary')fh=fh.filter(i=>i.data.isSummary);
        if(fh.length===0)h+=`<div class="text-center py-10 text-gray-500">該当データなし。</div>`;
        else{
            h+=`<div class="space-y-3">`;
            fh.forEach(i=>{
                let isSum=i.data.isSummary;let txt=isSum?i.data.summaryText:i.data.item1;let short=(txt||"").substring(0,35)+(txt?.length>35?"...":"");
                h+=`<div class="border border-gray-200 rounded-lg p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:bg-gray-50"><div class="flex-1 cursor-pointer" onclick="loadHistoryItem('${i.id}')"><div class="flex items-center gap-2 mb-1"><span class="font-bold text-lg text-teal-800">${i.data.date}</span>${isSum?'<span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-0.5 rounded font-bold">要約版</span>':''}<span class="text-sm text-gray-600 ml-auto">新人: ${i.data.name||'未設定'}</span></div><p class="text-sm text-gray-500">${escapeHtml(short)||'記載なし'}</p></div><div class="flex gap-2 w-full md:w-auto justify-end"><button onclick="loadHistoryItem('${i.id}')" class="px-3 py-1.5 bg-white border border-teal-500 text-teal-600 rounded text-sm">編集</button><button onclick="generatePDFFromHistory('${i.id}')" class="px-3 py-1.5 bg-teal-600 text-white rounded text-sm">PDF</button><button onclick="deleteHistoryItem('${i.id}')" class="px-3 py-1.5 bg-red-50 text-red-600 rounded text-sm">削除</button></div></div>`;
            });
            h+=`</div>`;
        }
    }
    return h+`</div>`;
}

function renderAnalysis(){
    return `<div class="bg-white rounded-xl shadow-sm p-4 md:p-6 mb-6"><h2 class="text-xl font-bold mb-2">AI成長・課題分析</h2><p class="text-sm text-gray-600 mb-6">過去のデータを分析します。</p><div class="flex justify-center mb-8"><button onclick="startAiAnalysis()" id="btn-analysis" class="px-6 py-3 bg-indigo-600 text-white rounded-full font-bold shadow-md">成長レポートを作成</button></div><div id="analysis-result" class="hidden"><h3 class="text-lg font-bold border-b pb-2">分析レポート</h3><div id="analysis-content" class="prose prose-sm bg-indigo-50 p-6 rounded-lg mt-4"></div></div></div>`;
}

function renderSettings(){
    return `<div class="bg-white rounded-xl shadow-sm p-4 md:p-6 mb-6"><h2 class="text-xl font-bold mb-6">設定</h2><div class="space-y-6"><div class="p-4 bg-gray-50 border rounded-lg"><label class="block font-bold mb-2">指導者名</label><input type="text" id="setting_trainer" value="${state.settings.defaultTrainer||''}" class="w-full p-3 border rounded"></div><div class="p-4 bg-gray-50 border rounded-lg"><label class="block font-bold mb-2">Gemini API</label><input type="password" id="setting_apikey" value="${state.settings.apiKey}" class="w-full p-3 border rounded font-mono"></div><div class="p-4 bg-gray-50 border rounded-lg"><label class="block font-bold mb-2">GAS URL</label><input type="url" id="setting_gasurl" value="${state.settings.gasUrl}" class="w-full p-3 border rounded font-mono"></div><div class="flex justify-end"><button onclick="saveSettingsForm()" class="px-6 py-3 bg-teal-600 text-white rounded-lg font-bold">保存</button></div></div><div class="mt-8 border-t pt-6"><h3 class="text-lg font-bold mb-4">テンプレート管理</h3><div class="space-y-2">${state.templates.length===0?'<p class="text-sm text-gray-500">なし</p>':state.templates.map(t=>`<div class="flex justify-between items-center p-3 bg-gray-50 border rounded-lg"><span class="text-sm font-medium">${escapeHtml(t.name)}</span><button onclick="deleteTemplate('${t.id}')" class="text-xs px-3 py-1 bg-red-100 text-red-600 rounded">削除</button></div>`).join('')}</div></div></div>`;
}

function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function initTextareas(){document.querySelectorAll('textarea').forEach(el=>autoResize(el));}
function updateFormData(k,v){state.formData[k]=v;saveDraft();}
function clearForm(){if(confirm("クリアしますか？")){state.formData={date:new Date().toLocaleDateString('sv-SE'),name:'',trainer:state.settings.defaultTrainer||'',item1:'',item2:'',item3:'',item4:'',item5:'',item6:'',item7:'',isSummary:false,summaryText:''};state.currentId=null;saveDraft();renderApp();showToast("クリアしました");}}

function saveCurrentForm(){
    if(!state.formData.date){showToast("日付を入力してください","error");return;}
    let id=state.currentId||Date.now().toString(),r={id,data:{...state.formData}};
    if(state.currentId){let i=state.history.findIndex(x=>x.id===id);if(i!==-1)state.history[i]=r;else state.history.push(r);showToast("保存しました");}else{state.history.push(r);state.currentId=id;showToast("新規保存しました");}
    saveHistory();saveDraft();renderApp();sendToGas('save',r,'history');
}

function loadHistoryItem(id){let r=state.history.find(x=>x.id===id);if(r){state.formData={...r.data};state.currentId=r.id;saveDraft();switchTab('form');showToast("読み込みました");}}

function copyToClipboard(){
    let txt=`【日付】 ${state.formData.date||''}\n【氏名（新人）】 ${state.formData.name||''}\n【指導者】 ${state.formData.trainer||''}\n\n`;

    const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast("テキストをコピーしました！");
}

let apiHistory=[];
async function callGeminiText(p,s=""){
    let k=state.settings.apiKey||envApiKey;if(!k)throw new Error("APIキー未設定");
    let n=Date.now();apiHistory=apiHistory.filter(x=>n-x<60000);
    if(apiHistory.length>=14)throw new Error("使いすぎ防止作動。数秒待機ください");apiHistory.push(n);
    let o={contents:[{parts:[{text:p}]}]};if(s)o.systemInstruction={parts:[{text:s}]};
    for(let m of ['gemini-3.1-flash','gemini-3.0-flash','gemini-2.5-flash']){
        let u=`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${k}`;
        for(let i=0;i<3;i++){try{let r=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(o)});if(!r.ok){if(r.status===429)throw new Error("LIMIT");if(r.status===404)throw new Error("NA");throw new Error("ERR");}let d=await r.json();return d.candidates?.[0]?.content?.parts?.[0]?.text||"";}catch(e){if(e.message==="LIMIT")throw new Error("制限到達。1分待機ください");if(e.message==="NA")break;if(i===2)break;await new Promise(x=>setTimeout(x,1000));}}
    }throw new Error("通信失敗");
}

    let t=state.formData[id];if(!t||!t.trim()){showToast("入力してください","info");return;}

    try{let r=await callGeminiText(p,s);curField=id;let c=document.getElementById('aiModalContent');c.innerHTML=`<div class="mb-4"><label class="block font-bold mb-1">修正前</label><div class="p-3 bg-gray-50 border rounded-lg text-sm whitespace-pre-wrap mb-4">${escapeHtml(t)}</div><label class="block font-bold mb-1">修正案(手直し可)</label><textarea id="aiSuggestedText" class="w-full p-3 border-2 border-teal-200 rounded-lg text-sm" rows="6">${r.trim()}</textarea></div>`;document.getElementById('aiModalAll').classList.remove('hidden');document.getElementById('aiModalAll').classList.add('flex');setTimeout(()=>{let ta=document.getElementById('aiSuggestedText');if(ta)autoResize(ta);},50);}catch(e){showToast(e.message,"error");}finally{b.innerHTML=oh;b.disabled=false;}

async function requestAiSummaryAll(){
    if(!fields.some(f=>state.formData[f.id])){showToast("要約する内容がありません","info");return;}
    let b=event.currentTarget,oh=b.innerHTML;b.innerHTML=`<span class="spinner"></span>...`;b.disabled=true;

    let s=`パートから上司へ提出するOJT日報の要約。丁寧な「です・ます」調。パッと見て伝わるよう改行や箇条書きで整理。前向きなニュアンスに変換。要約文のみ出力。`,p=`以下のOJT振り返りメモを、1つのまとまった報告文に要約して。\n\n${txt}`;

async function startAiAnalysis(){
    if(state.history.length===0){showToast("履歴データがありません","info");return;}
    let b=document.getElementById('btn-analysis'),oh=b.innerHTML;b.innerHTML=`<span class="spinner"></span>...`;b.disabled=true;
    let txt="";[...state.history].sort((a,b)=>new Date(b.data.date)-new Date(a.data.date)).slice(0,10).forEach(i=>{txt+=`[${i.data.date}]\nできたこと:${i.data.item2}\n課題:${i.data.item3}\n安全:${i.data.item4}\n所感:${i.data.item6}\n\n`;});
    let s="人材育成のプロとしてOJT記録を分析し、成長と課題を要約。",p=`以下をもとに分析レポート(Markdown)を作成。\n1.全体的な成長\n2.現在の課題\n3.安全面\n4.今後のアドバイス\n\n${txt}`;
    try{let r=await callGeminiText(p,s);document.getElementById('analysis-content').innerHTML=r.replace(/^### (.*$)/gim,'<h4 class="font-bold mt-4 mb-2 text-indigo-700">$1</h4>').replace(/^## (.*$)/gim,'<h3 class="text-lg font-bold mt-5 mb-3 text-indigo-800 border-b pb-1">$1</h3>').replace(/^# (.*$)/gim,'<h2 class="text-xl font-bold mt-6 mb-3 text-indigo-900">$1</h2>').replace(/\*\*(.*)\*\*/gim,'<strong class="font-bold">$1</strong>').replace(/^\* (.*$)/gim,'<li class="ml-4 list-disc">$1</li>').replace(/^- (.*$)/gim,'<li class="ml-4 list-disc">$1</li>').replace(/\n/g,'<br>').replace(/<\/li><br>/g,'</li>');document.getElementById('analysis-result').classList.remove('hidden');showToast("完成しました");}catch(e){showToast(e.message,"error");}finally{b.innerHTML=oh;b.disabled=false;}
}

function formatLines(t){return t?t.split('\n').map(l=>`<div class="pdf-line">${l?escapeHtml(l):'<br>'}</div>`).join(''):'';}
function generatePDFFromHistory(id){let r=state.history.find(x=>x.id===id);if(r)createPdf(r.data);}
function generatePDF(){createPdf(state.formData);}
function createPdf(d){
    let b=document.getElementById('btn-pdf');if(b){b.innerHTML=`<span class="spinner"></span>...`;b.disabled=true;}showToast("PDF作成中...","info");
    let h=`<div class="pdf-page"><div class="pdf-title">${d.isSummary?'OJT振り返り（要約版）':'OJT振り返り（日報）'}</div><div class="pdf-header-info"><div><strong>【日付】</strong> ${d.date||'未記入'}</div><div><strong>【氏名】</strong> ${d.name||'未記入'}</div><div><strong>【指導者】</strong> ${d.trainer||'未記入'}</div></div>`;
    if(d.isSummary)h+=`<div class="pdf-section"><div class="pdf-label">提出用レポート</div><div class="pdf-value">${d.summaryText?formatLines(d.summaryText):'<div class="pdf-line">（記入なし）</div>'}</div></div>`;
    else fields.forEach(f=>h+=`<div class="pdf-section"><div class="pdf-label">${f.label}</div><div class="pdf-value">${d[f.id]?formatLines(d[f.id]):'<div class="pdf-line">（記入なし）</div>'}</div></div>`);
    document.getElementById('pdf-content').innerHTML=h+`</div>`;
    setTimeout(()=>{html2pdf().set({margin:[15,20,15,20],filename:`OJT日報_${d.date}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true,logging:false},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy']}}).from(document.getElementById('pdf-content')).toPdf().get('pdf').then(p=>{let t=p.internal.getNumberOfPages();for(let i=1;i<=t;i++){p.setPage(i);p.setFontSize(10);p.setTextColor(100);p.text(`${d.date?d.date.replace(/-/g,'/'):''}    ${i} / ${t}`,190,8,{align:'right'});}}).save().then(()=>{if(b){b.innerHTML=`PDFを作成`;b.disabled=false;}showToast("完了しました");}).catch(e=>{if(b){b.innerHTML=`PDFを作成`;b.disabled=false;}showToast("エラー発生","error");});},100);
}
function escapeHtml(s){return s?s.replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])):'';}
function showToast(m,t='success'){let c=document.getElementById('toast-container'),d=document.createElement('div');d.className=`toast ${t}`;d.textContent=m;c.appendChild(d);setTimeout(()=>{d.style.animation='fadeOut 0.5s ease forwards';setTimeout(()=>{if(c.contains(d))c.removeChild(d);},500);},3000);}
</script></body></html>
